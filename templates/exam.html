<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCNA Exam</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0e1a;
      color: #e0e6f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP BAR ── */
    .topbar {
      background: #111827;
      border-bottom: 1px solid #1e3a5f;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .brand { font-weight: 700; font-size: 16px; color: #fff; }
    .progress-text { font-size: 13px; color: #6b7280; }
    .timer {
      font-size: 18px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #3b82f6;
      background: #1f2937;
      padding: 6px 14px;
      border-radius: 8px;
    }
    .timer.warning { color: #f59e0b; }
    .timer.danger { color: #ef4444; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

    /* ── MAIN LAYOUT ── */
    .main { display: flex; flex: 1; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 220px;
      background: #111827;
      border-right: 1px solid #1f2937;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .sidebar-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #4b5563;
      margin-bottom: 4px;
    }
    .q-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
    }
    .q-dot {
      aspect-ratio: 1;
      border-radius: 6px;
      background: #1f2937;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      color: #6b7280;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .q-dot:hover { background: #263040; color: #d1d5db; }
    .q-dot.answered { background: #1e3a5f; color: #60a5fa; border-color: #2563eb; }
    .q-dot.marked { background: #3b1f00; color: #f59e0b; border-color: #d97706; }
    .q-dot.active { background: #1a56db; color: #fff; border-color: #3b82f6; }

    .legend { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #6b7280; }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0;
    }

    /* ── QUESTION AREA ── */
    .question-area {
      flex: 1;
      padding: 32px 40px;
      overflow-y: auto;
      max-width: 820px;
    }
    .q-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .q-number {
      font-size: 13px;
      font-weight: 600;
      color: #3b82f6;
      background: #1e3a5f;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .multi-badge {
      font-size: 12px;
      background: #3b1f00;
      color: #f59e0b;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }
    .mark-btn {
      font-size: 12px;
      background: transparent;
      border: 1px solid #374151;
      color: #9ca3af;
      padding: 4px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .mark-btn:hover, .mark-btn.active {
      background: #3b1f00;
      border-color: #d97706;
      color: #f59e0b;
    }
    .q-text {
      font-size: 16px;
      line-height: 1.7;
      color: #e5e7eb;
      margin-bottom: 20px;
    }
    .exhibit-img {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #1f2937;
      margin-bottom: 20px;
      cursor: zoom-in;
    }
    .lightbox {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 300;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .lightbox.show { display: flex; }
    .lightbox img { max-width: 95vw; max-height: 90vh; border-radius: 8px; }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: #1f2937;
      border: 2px solid #374151;
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .option:hover { background: #263040; border-color: #4b5563; }
    .option.selected { background: #1e3a5f; border-color: #3b82f6; }
    .option-key {
      width: 28px; height: 28px;
      border-radius: 6px;
      background: #374151;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #9ca3af;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .option.selected .option-key {
      background: #2563eb;
      color: #fff;
    }
    .option-text { font-size: 14px; line-height: 1.5; padding-top: 4px; }

    /* ── NAVIGATION ── */
    .nav-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #1f2937;
    }
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-ghost {
      background: #1f2937;
      color: #9ca3af;
      border: 1px solid #374151;
    }
    .btn-ghost:hover { background: #263040; color: #d1d5db; }
    .btn-primary {
      background: linear-gradient(135deg, #1a56db, #0ea5e9);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-danger {
      background: #7f1d1d;
      color: #fca5a5;
      border: 1px solid #991b1b;
    }
    .btn-danger:hover { background: #991b1b; }

    /* ── RESULTS ── */
    #results-screen {
      display: none;
      flex: 1;
      padding: 40px;
      overflow-y: auto;
    }
    .score-card {
      background: #111827;
      border: 1px solid #1e3a5f;
      border-radius: 16px;
      padding: 40px;
      max-width: 700px;
      margin: 0 auto 32px;
      text-align: center;
    }
    .score-circle {
      width: 120px; height: 120px;
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-weight: 700;
    }
    .score-circle.pass { background: #064e3b; border: 3px solid #10b981; }
    .score-circle.fail { background: #3b0a0a; border: 3px solid #ef4444; }
    .score-pct { font-size: 32px; color: #fff; }
    .score-label { font-size: 12px; color: #6b7280; }
    .score-verdict {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .score-verdict.pass { color: #10b981; }
    .score-verdict.fail { color: #ef4444; }
    .score-sub { font-size: 14px; color: #6b7280; }

    .review-list { max-width: 700px; margin: 0 auto; }
    .review-item {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .review-item.correct { border-left: 4px solid #10b981; }
    .review-item.wrong { border-left: 4px solid #ef4444; }
    .review-q { font-size: 14px; color: #d1d5db; margin-bottom: 12px; line-height: 1.6; }
    .review-option {
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 6px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .review-option.correct-ans { background: #064e3b; color: #6ee7b7; }
    .review-option.wrong-ans { background: #3b0a0a; color: #fca5a5; }
    .review-option.neutral { color: #6b7280; }
    .review-expl {
      margin-top: 12px;
      font-size: 13px;
      color: #9ca3af;
      background: #1f2937;
      padding: 12px;
      border-radius: 8px;
      line-height: 1.6;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="brand">🌐 CCNA 200-301</div>
    <div class="progress-text" id="progress-text">Loading...</div>
  </div>
  <div class="timer" id="timer">90:00</div>
</div>

<!-- MAIN -->
<div class="main" id="exam-main">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-title">Questions</div>
    <div class="q-grid" id="q-grid"></div>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:#1a56db"></div> Current
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#1e3a5f;border:1px solid #2563eb"></div> Answered
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#3b1f00;border:1px solid #d97706"></div> Marked
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#1f2937"></div> Unanswered
      </div>
    </div>
    <button class="btn btn-danger" style="margin-top:auto" onclick="confirmSubmit()">Submit Exam</button>
  </div>

  <!-- QUESTION -->
  <div class="question-area" id="question-area">
    <div id="q-loading" style="color:#6b7280;font-size:14px">Loading questions...</div>
    <div id="q-content" class="hidden">
      <div class="q-header">
        <span class="q-number" id="q-num-badge">Q1</span>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="multi-badge hidden" id="multi-badge">Choose multiple</span>
          <button class="mark-btn" id="mark-btn" onclick="toggleMark()">🚩 Mark for review</button>
        </div>
      </div>
      <div class="q-text" id="q-text"></div>
      <img id="exhibit-img" class="exhibit-img hidden" src="" alt="Exhibit" onclick="openLightbox(this.src)">
      <div class="options" id="options"></div>
      <div class="nav-bar">
        <button class="btn btn-ghost" id="btn-prev" onclick="navigate(-1)">← Previous</button>
        <button class="btn btn-primary" id="btn-next" onclick="navigate(1)">Next →</button>
      </div>
    </div>
  </div>
</div>

<!-- RESULTS -->
<div id="results-screen">
  <div class="score-card" id="score-card"></div>
  <div class="review-list" id="review-list"></div>
  <div style="text-align:center;margin-bottom:32px">
    <a href="/" style="color:#3b82f6;font-size:14px">← Back to home</a>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="">
</div>

<script>
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
}

let questions = [];
let current = 0;
let userAnswers = {};  // { qid: [letters] }
let marked = new Set();
let timerInterval;
let secondsLeft = 90 * 60;

async function init() {
  const res = await fetch('/api/questions');
  questions = await res.json();
  if (!questions.length) { document.getElementById('q-loading').textContent = 'No questions found.'; return; }
  buildGrid();
  showQuestion(0);
  startTimer();
  document.getElementById('q-loading').classList.add('hidden');
  document.getElementById('q-content').classList.remove('hidden');
}

function buildGrid() {
  const grid = document.getElementById('q-grid');
  grid.innerHTML = '';
  questions.forEach((q, i) => {
    const dot = document.createElement('div');
    dot.className = 'q-dot';
    dot.textContent = i + 1;
    dot.id = `dot-${i}`;
    dot.onclick = () => showQuestion(i);
    grid.appendChild(dot);
  });
}

function updateGrid() {
  questions.forEach((q, i) => {
    const dot = document.getElementById(`dot-${i}`);
    dot.className = 'q-dot';
    const qid = String(q.id);
    if (i === current) dot.classList.add('active');
    else if (marked.has(i)) dot.classList.add('marked');
    else if (userAnswers[qid]?.length) dot.classList.add('answered');
  });
}

function showQuestion(idx) {
  current = idx;
  const q = questions[idx];
  const qid = String(q.id);

  document.getElementById('q-num-badge').textContent = `Q${idx + 1} / ${questions.length}`;
  document.getElementById('progress-text').textContent = `${idx + 1} of ${questions.length}`;
  document.getElementById('q-text').textContent = q.question;

  const multiBadge = document.getElementById('multi-badge');
  if (q.multiple) multiBadge.classList.remove('hidden');
  else multiBadge.classList.add('hidden');

  const markBtn = document.getElementById('mark-btn');
  markBtn.classList.toggle('active', marked.has(idx));

  const imgEl = document.getElementById('exhibit-img');
  if (q.image) { imgEl.src = `/static/images/${q.image}`; imgEl.classList.remove('hidden'); }
  else { imgEl.classList.add('hidden'); }

  const selected = userAnswers[qid] || [];
  const optContainer = document.getElementById('options');
  optContainer.innerHTML = '';

  Object.entries(q.options).forEach(([letter, text]) => {
    const div = document.createElement('div');
    div.className = 'option' + (selected.includes(letter) ? ' selected' : '');
    div.innerHTML = `<div class="option-key">${letter}</div><div class="option-text">${text}</div>`;
    div.onclick = () => selectOption(letter, q);
    optContainer.appendChild(div);
  });

  document.getElementById('btn-prev').style.visibility = idx === 0 ? 'hidden' : 'visible';
  document.getElementById('btn-next').textContent = idx === questions.length - 1 ? 'Submit →' : 'Next →';
  if (idx === questions.length - 1) {
    document.getElementById('btn-next').onclick = confirmSubmit;
  } else {
    document.getElementById('btn-next').onclick = () => navigate(1);
  }

  updateGrid();
}

function selectOption(letter, q) {
  const qid = String(q.id);
  if (!userAnswers[qid]) userAnswers[qid] = [];

  if (q.multiple) {
    const idx2 = userAnswers[qid].indexOf(letter);
    if (idx2 === -1) userAnswers[qid].push(letter);
    else userAnswers[qid].splice(idx2, 1);
  } else {
    userAnswers[qid] = [letter];
  }
  showQuestion(current);
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < questions.length) showQuestion(next);
}

function toggleMark() {
  if (marked.has(current)) marked.delete(current);
  else marked.add(current);
  showQuestion(current);
}

function confirmSubmit() {
  const answered = Object.keys(userAnswers).filter(k => userAnswers[k].length > 0).length;
  const unanswered = questions.length - answered;
  const msg = unanswered > 0
    ? `You have ${unanswered} unanswered question(s). Submit anyway?`
    : `Submit exam with ${answered} answers?`;
  if (confirm(msg)) submitExam();
}

async function submitExam() {
  clearInterval(timerInterval);
  const res = await fetch('/api/submit', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ answers: userAnswers })
  });
  const data = await res.json();
  showResults(data);
}

function showResults(data) {
  document.getElementById('exam-main').style.display = 'none';
  document.getElementById('results-screen').style.display = 'block';
  document.querySelector('.topbar').style.display = 'none';

  const passed = data.passed;
  const card = document.getElementById('score-card');
  card.innerHTML = `
    <div class="score-circle ${passed ? 'pass' : 'fail'}">
      <div class="score-pct">${data.score}%</div>
      <div class="score-label">Score</div>
    </div>
    <div class="score-verdict ${passed ? 'pass' : 'fail'}">${passed ? 'PASSED ✓' : 'FAILED ✗'}</div>
    <div class="score-sub">${data.correct} correct out of ${data.total} questions &nbsp;·&nbsp; Passing: 82%</div>
  `;

  const list = document.getElementById('review-list');
  list.innerHTML = '<div style="font-size:18px;font-weight:700;color:#fff;margin-bottom:20px">Review Answers</div>';
  data.results.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = `review-item ${r.correct ? 'correct' : 'wrong'}`;
    let optHtml = '';
    Object.entries(r.options).forEach(([letter, text]) => {
      const isCorrect = r.correct_answers.includes(letter);
      const isUser = r.user_answers.includes(letter);
      let cls = 'neutral';
      let icon = '';
      if (isCorrect && isUser) { cls = 'correct-ans'; icon = '✓ '; }
      else if (!isCorrect && isUser) { cls = 'wrong-ans'; icon = '✗ '; }
      else if (isCorrect && !isUser) { cls = 'correct-ans'; icon = '✓ '; }
      optHtml += `<div class="review-option ${cls}">${icon}<strong>${letter}.</strong> ${text}</div>`;
    });
    div.innerHTML = `
      <div class="review-q"><strong>Q${i+1}.</strong> ${r.question}</div>
      ${optHtml}
      ${r.explanation ? `<div class="review-expl"><strong>Explanation:</strong> ${r.explanation}</div>` : ''}
    `;
    list.appendChild(div);
  });
}

function startTimer() {
  function update() {
    const m = Math.floor(secondsLeft / 60);
    const s = secondsLeft % 60;
    const el = document.getElementById('timer');
    el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    el.className = 'timer';
    if (secondsLeft <= 300) el.classList.add('warning');
    if (secondsLeft <= 60) el.classList.add('danger');
    if (secondsLeft <= 0) { clearInterval(timerInterval); submitExam(); }
    secondsLeft--;
  }
  update();
  timerInterval = setInterval(update, 1000);
}

init();
</script>
</body>
</html>
